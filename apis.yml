aid: tunecore
name: TuneCore
description: >-
  TuneCore is a Brooklyn, New York based independent music distribution and
  publishing administration company founded in 2006 (as YourTunes, Inc.,
  rebranded TuneCore in 2008) and acquired by French music company Believe
  in 2015. TuneCore lets self-releasing artists and labels deliver recorded
  music to 150+ digital stores and streaming services — Spotify, Apple Music,
  Amazon Music, YouTube Music, TikTok, Tidal, Deezer, Beatport, and others —
  while retaining 100% of their rights and master ownership, in exchange for
  a flat annual distribution fee starting at $24.99/year for unlimited
  releases. TuneCore Publishing Administration registers compositions with
  performance rights organizations, mechanical rights societies, and digital
  service providers worldwide to collect songwriter royalties, sync, and
  neighboring rights income. Additional services include the TuneCore
  Accelerator artist development program, TuneCore Social (monetization on
  TikTok, Reels, and Shorts), TuneCore Direct Advance (royalty-backed
  capital, powered by RoyFi), mastering, and Splits for collaborator
  revenue sharing. TuneCore operates across 5 continents with local teams
  in 15+ countries through Believe's global network. There is no current
  public TuneCore developer API, SDK, or partner portal — an earlier
  white-label REST/XML "TuneCore Direct" partner API existed circa
  2008-2012 (with a community Ruby gem `tunecore_direct`) but is no longer
  actively documented or promoted. TuneCore's public-facing surface is
  the artist web app at web.tunecore.com and the support/help center; any
  current B2B integrations run through Believe's enterprise partnerships.
